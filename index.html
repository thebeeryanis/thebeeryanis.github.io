<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Beeryanis Band</title>

  <meta name="description" content="Beeryanis – Divorced Dadrock band. Listen to our latest music and see upcoming shows.">

  <link rel="stylesheet" href="style.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NHFRYG6W55"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NHFRYG6W55');
  </script>
</head>

<body>

<!-- GAME SCREEN -->
<div class="game-screen">
  <div class="game-title" style="color: #000;">🔐 Human Verification</div>
  <div class="game-instructions" style="color: #000; font-weight: 700;">Press SPACE or click/tap to jump</div>

  <div class="game-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div class="game-info">
    <div class="game-score" style="font-size: 2rem; font-weight: bold; color: #ff8c42; margin-bottom: 10px;">Score: <span id="score-text">0</span> / 5</div>
    <div class="score-bar">
      <div class="score-point"></div>
      <div class="score-point"></div>
      <div class="score-point"></div>
      <div class="score-point"></div>
      <div class="score-point"></div>
    </div>
    <div class="unlock-message" style="display:none;">Unlocked!</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-container">
    <img src="logo.png" class="logo" alt="Beeryanis Logo">
    <h1>Beeryanis Band</h1>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="links.html">Links</a>
  </nav>
</header>

<!-- MAIN -->
<main>

  <section class="hero">
    <h2>Beeryanis</h2>
    <p>Divorced Dadrock. Raw. Loud. Real.</p>
    <a href="links.html">Listen Now</a>
  </section>

  <section>
    <h3>About</h3>
    <p>We are Beeryanis — making alternative rock with attitude.</p>
  </section>

</main>

<footer>
  <p>© 2026 Beeryanis</p>
</footer>

<div class="logo-modal" role="dialog" aria-modal="true" aria-label="Enlarged band logo">
  <div class="logo-modal-content">
    <img src="logo.png" class="logo-modal-img" alt="Beeryanis logo enlarged">
    <div class="logo-modal-close" aria-label="Close logo preview">×</div>
  </div>
</div>

<script>
  // Check if game is already completed
  let hasCompletedGame = localStorage.getItem('beeryanisGameCompleted') === 'true';

  document.addEventListener("DOMContentLoaded", () => {
    // Hide website if game not completed
    if (!hasCompletedGame) {
      document.querySelector("header").style.display = "none";
      document.querySelector("main").style.display = "none";
      document.querySelector("footer").style.display = "none";
      
      // Show game screen and start game
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      const note = {
        x: 80,
        y: canvas.height - 98,
        width: 32,
        height: 38,
        velocity: 0,
        jump: -14,
        grounded: true
      };

      const gravity = 0.6;
      const minObstacleGap = 280;
      let obstacles = [];
      let points = [];
      let score = 0;
      let gameOver = false;
      const targetScore = 5;

      function canSpawnObstacle() {
        return obstacles.length === 0 || canvas.width - obstacles[obstacles.length - 1].x > minObstacleGap;
      }

      function jump() {
        if (note.grounded && !gameOver) {
          note.velocity = note.jump;
          note.grounded = false;
        }
      }

      document.addEventListener("keydown", e => {
        if (e.code === "Space") {
          e.preventDefault();
          jump();
        }
        if (e.key === "r" && gameOver) {
          location.reload();
        }
      });

      document.addEventListener("pointerdown", () => {
        if (gameOver) {
          // Restart game on click or tap when failed
          location.reload();
        } else {
          jump();
        }
      });

      function drawNote() {
        ctx.fillStyle = "#111";
        ctx.fillRect(note.x, note.y, note.width, note.height);

        // Guitar neck and body silhouette
        ctx.fillStyle = "#111";
        ctx.fillRect(note.x + note.width - 8, note.y + 12, 14, 5);
        ctx.fillRect(note.x + note.width - 4, note.y + 8, 4, 22);
        ctx.beginPath();
        ctx.moveTo(note.x + note.width + 8, note.y + 8);
        ctx.lineTo(note.x + note.width + 18, note.y + 4);
        ctx.lineTo(note.x + note.width + 18, note.y + 16);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#222";
        ctx.fillRect(note.x + 6, note.y + 10, 10, 4);
      }

      function drawOb(o) {
        ctx.fillStyle = "#111";
        ctx.fillRect(o.x, o.y, o.width, o.height);
        ctx.fillStyle = "#222";
        ctx.fillRect(o.x + 6, o.y + 6, o.width - 12, o.height - 12);
        ctx.fillStyle = "rgba(255, 140, 66, 0.85)";
        ctx.fillRect(o.x + 6, o.y + o.height - 14, o.width - 12, 8);
      }

      function drawPt(p) {
        ctx.fillStyle = "#2d9d4d";
        ctx.beginPath();
        ctx.arc(p.x + 8, p.y + 8, 8, 0, Math.PI * 2);
        ctx.fill();
      }

      function collision(a, b) {
        return a.x < b.x + b.width &&
               a.x + a.width > b.x &&
               a.y < b.y + b.height &&
               a.y + a.height > b.y;
      }

      let bgOffset = 0;

      function loop() {
        // Animated background and city silhouette
        ctx.fillStyle = "rgba(10, 14, 30, 0.96)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const bgColors = ["rgba(45, 157, 77, 0.16)", "rgba(255, 140, 66, 0.12)", "rgba(90, 180, 140, 0.1)"];
        for (let i = 0; i < 5; i++) {
          const x = canvas.width - ((bgOffset + i * 220) % (canvas.width + 220));
          const y = 80 + (i % 2) * 60;
          const radius = 55 + (i * 6);
          ctx.fillStyle = bgColors[i % bgColors.length];
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        const skylineBase = canvas.height - 60;
        let skylineX = -((bgOffset * 0.5) % 140);
        const buildingHeights = [72, 48, 90, 58, 100, 40, 82, 52, 110, 66, 74, 54];
        for (let i = 0; i < buildingHeights.length; i++) {
          const width = 48 + (i % 3) * 12;
          const height = buildingHeights[i];
          ctx.fillStyle = "rgba(15, 20, 40, 1)";
          ctx.fillRect(skylineX, skylineBase - height, width, height);
          ctx.fillStyle = "rgba(24, 34, 62, 1)";
          ctx.fillRect(skylineX + 6, skylineBase - height + 18, 10, 12);
          ctx.fillRect(skylineX + 26, skylineBase - height + 26, 8, 10);
          skylineX += width + 24;
        }

        bgOffset = (bgOffset + 2) % (canvas.width + 220);

        // gravity
        note.velocity += gravity;
        note.y += note.velocity;

        if (note.y >= canvas.height - 60 - note.height) {
          note.y = canvas.height - 60 - note.height;
          note.velocity = 0;
          note.grounded = true;
        }

        // spawn
        if (Math.random() < 0.01 && canSpawnObstacle()) {
          obstacles.push({ x: canvas.width, y: canvas.height - 60, width: 44, height: 44 });
        }

        if (Math.random() < 0.015) {
          points.push({ x: canvas.width, y: canvas.height - 120, width: 16, height: 16 });
        }

        // update obstacles
        obstacles = obstacles.filter(o => {
          o.x -= 4;
          return o.x > 0;
        });
        
        points = points.filter(p => {
          p.x -= 4;
          return p.x > 0;
        });

        // draw
        drawNote();
        obstacles.forEach(drawOb);
        points.forEach(drawPt);

        // collisions
        obstacles.forEach(o => {
          if (collision(note, o)) gameOver = true;
        });

        points.forEach((p, i) => {
          if (collision(note, p)) {
            score++;
            points.splice(i, 1);
            document.getElementById("score-text").innerText = score;
            
            // Update score dots
            const dots = document.querySelectorAll(".score-point");
            dots.forEach((dot, index) => {
              if (index < score) {
                dot.style.background = "#ff8c42";
              }
            });
          }
        });

        if (score >= targetScore) {
          // Game won - unlock site
          localStorage.setItem("beeryanisGameCompleted", "true");
          document.querySelector(".game-screen").style.display = "none";
          document.querySelector("header").style.display = "block";
          document.querySelector("main").style.display = "block";
          document.querySelector("footer").style.display = "block";
          return;
        }

        if (!gameOver) {
          requestAnimationFrame(loop);
        }
      }

      loop();
    } else {
      // Game already completed - hide game screen and show website
      document.querySelector(".game-screen").style.display = "none";
      document.querySelector("header").style.display = "block";
      document.querySelector("main").style.display = "block";
      document.querySelector("footer").style.display = "block";
    }

    // Logo modal (always available after game)
    if (hasCompletedGame) {
      const logo = document.querySelector(".logo");
      const modal = document.querySelector(".logo-modal");
      
      if (logo && modal) {
        const modalImg = document.querySelector(".logo-modal-img");
        const closeBtn = document.querySelector(".logo-modal-close");
        
        logo.addEventListener("click", function() {
          modalImg.src = this.src;
          modal.style.display = "flex";
          document.body.style.overflow = "hidden";
        });
        
        closeBtn.addEventListener("click", function() {
          modal.style.display = "none";
          document.body.style.overflow = "auto";
        });
        
        modal.addEventListener("click", function(e) {
          if (e.target === modal) {
            modal.style.display = "none";
            document.body.style.overflow = "auto";
          }
        });
        
        logo.style.cursor = "pointer";
      }
    }
  });
</script>

</body>
</html>
